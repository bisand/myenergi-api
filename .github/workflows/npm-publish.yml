# Runs tests and publishes the package to npm when a release is created.
# Publishing uses npm Trusted Publishing (OIDC) - no npm token is needed.
# The trusted publisher on npmjs.com must reference this exact workflow
# filename (npm-publish.yml) in bisand/myenergi-api.

name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Required for npm Trusted Publishing (OIDC)
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/
      # Trusted Publishing requires npm 11.5.1 or newer
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish
